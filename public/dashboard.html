<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - INEVIEWER</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-light d-flex flex-column" style="height:100vh;">

  <nav class="navbar navbar-dark bg-dark navbar-shrink">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">INEVIEWER</span>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-outline-light btn-sm d-none" id="btnBack">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Volver
        </button>
        <span class="text-light small" id="userLabel">Cargando...</span>
        <a href="/logout" class="btn btn-outline-light btn-sm">Cerrar sesion</a>
      </div>
    </div>
  </nav>

  <div id="defaultMessage" class="d-flex justify-content-center align-items-center flex-grow-1">
    <div class="text-center">
      <h4 class="text-muted">No hay contenido asignado</h4>
      <p class="text-muted">Contacta al administrador para que te asigne un iframe.</p>
    </div>
  </div>

  <div id="selectionView" class="d-none flex-grow-1 overflow-auto">
    <div class="container py-4">
      <div class="text-center mb-4">
        <h4 class="fw-bold text-dark">📜Selecciona un visor para el proyecto</h4>
        <p class="text-muted">Elige el iframe que deseas visualizar</p>
      </div>
      <div id="iframeGrid" class="row g-4 justify-content-center"></div>
    </div>
    <iframe 
  src="https://docs.google.com/forms/d/e/1FAIpQLSdj-81MVjO2UxpdMI3zjbkZzE7YxnJ2YRuXzVCtagDhBEgZhQ/viewform?usp=sharing&ouid=108648722245701756606&rtpof=true&sd=true" 
  width="640" 
  height="800" 
  frameborder="0" 
  marginheight="0" 
  marginwidth="0">
  Cargando…
</iframe>
  </div>

  <div id="viewerView" class="d-none flex-grow-1">
    <div id="viewerFrame" class="w-100 h-100"></div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
